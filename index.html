<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miami City RP - FBI MDT Avanzado</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #030712;
            color: #f3f4f6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Formulario Login */
        .form-container {
            background: #0b1329;
            border: 1px solid #1e3a8a;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .form-container h2 {
            color: #38bdf8;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .btn-submit {
            width: 100%;
            background: #1e3a8a;
            border: 1px solid #38bdf8;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background: #2563eb;
        }

        /* Contenedor Principal MDT */
        .mdt-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Topbar */
        .mdt-topbar {
            background-color: #060b18;
            border-bottom: 1px solid #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge-icon { font-size: 20px; }
        .server-title { font-weight: 800; color: #fff; font-size: 14px; letter-spacing: 1px; }
        .divider { color: #334155; }
        .dept-title { color: #94a3b8; font-size: 12px; font-weight: 600; }

        .btn-duty {
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .duty-on { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.3); }
        .duty-off { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }

        /* Perfil de Usuario */
        .user-profile-wrapper { position: relative; }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #0f172a;
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #1e293b;
        }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .status-indicator.online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .username { font-size: 12px; font-weight: 600; color: #e2e8f0; }
        .rank-tag { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; border: 1px solid; }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 35px;
            background-color: #0b111e;
            min-width: 140px;
            border: 1px solid #1e293b;
            border-radius: 4px;
            z-index: 10;
        }
        .btn-logout {
            width: 100%;
            background: none;
            border: none;
            color: #ef4444;
            padding: 10px;
            text-align: left;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.1); }

        /* Estructura Sidebar */
        .mdt-main { display: flex; flex: 1; height: calc(100vh - 60px); }
        .mdt-sidebar { width: 240px; background-color: #040814; border-right: 1px solid #1e293b; padding: 15px 10px; }
        .sidebar-header { font-size: 10px; font-weight: 800; color: #4b5563; padding-left: 10px; margin-bottom: 10px; letter-spacing: 1px; }
        
        .menu-item {
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.2s;
        }
        .menu-item:hover { background: #0f172a; color: #fff; }
        .menu-item.active { background: #1e3a8a; color: #38bdf8; border-left: 3px solid #38bdf8; }

        .mdt-content { flex: 1; background: #020613; padding: 25px; overflow-y: auto; }
        .content-header { margin-bottom: 25px; }
        .content-header h1 { font-size: 24px; font-weight: 700; color: #fff; }
        .content-header p { font-size: 13px; color: #6b7280; margin-top: 4px; }

        .card { background: #070c19; border: 1px solid #1e293b; border-radius: 8px; padding: 20px; margin-bottom: 20px; display: block; clear: both; }
        .card-full { width: 100%; }
        .card h3 { font-size: 14px; font-weight: 700; color: #94a3b8; letter-spacing: 0.5px; margin-bottom: 10px; }
        .card-hr { border: 0; border-top: 1px solid #1e293b; margin: 12px 0; }
        
        .grid-inputs-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; width: 100%; }
        .input-block { display: flex; flex-direction: column; width: 100%; }

        .mdt-input, .mdt-select, .mdt-textarea {
            width: 100%;
            background: #040814;
            border: 1px solid #1e293b;
            color: #fff;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            margin-top: 5px;
            display: block;
        }
        .mdt-select { cursor: pointer; background-color: #0b111e; }
        .input-label { font-size: 10px; font-weight: 800; color: #4b5563; letter-spacing: 0.5px; display: block; text-transform: uppercase; }

        /* Tablas */
        .table-ciudadanos, .table-admin { width: 100%; border-collapse: collapse; text-align: left; }
        .table-ciudadanos th, .table-admin th { font-size: 11px; color: #4b5563; font-weight: 800; padding: 10px; border-bottom: 1px solid #1e293b; }
        .table-ciudadanos td, .table-admin td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid #0f172a; vertical-align: middle; }

        .admin-layout-grid { display: grid; grid-template-columns: 1.5fr 1.2fr; gap: 20px; }

        .denuncia-layout-container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 15px; }
        .denuncia-sidebar { display: flex; flex-direction: column; padding: 15px; background: #050a14; min-height: 300px; }
        .denuncia-list-scroller { flex: 1; overflow-y: auto; }
        .denuncia-item-btn { padding: 10px; background: #0f172a; border: 1px solid #1e293b; margin-bottom: 8px; border-radius: 4px; cursor: pointer; }
        .denuncia-item-btn:hover { border-color: #38bdf8; }
        .denuncia-viewer-panel { background: #040813; padding: 20px; min-height: 300px; text-align: left; }
        
        .licencia-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .tag-residente { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .tag-buscado { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .scroller-box { max-height: 180px; overflow-y: auto; padding-right: 5px; margin-top: 10px; }
        
        /* Botones */
        .btn-admin-action { padding: 6px 12px; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; display: inline-block; transition: opacity 0.2s; text-align: center; }
        .btn-admin-action:hover { opacity: 0.85; }
        .btn-delete { background: #ef4444; border: 1px solid #b91c1c; }
        .btn-back { background: #1f2937; color: #fff; border: 1px solid #374151; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
        
        .check-container { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; color: #e2e8f0; cursor: pointer; }
        .check-container input { cursor: pointer; width: 16px; height: 16px; }

        .rango-badge-item { background: #040814; border: 1px solid #1e293b; padding: 8px 12px; border-radius: 4px; margin-top: 6px; display: flex; justify-content: space-between; align-items: center; }
        .rango-badge-item span { font-size: 12px; }
        .rango-permisos-lista { display: flex; gap: 6px; }
        .permiso-mini-tag { font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; background: #1e3a8a; color: #4b5563; }
        .permiso-mini-tag.active { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
    </style>

        const SUPABASE_ANON_KEY = "sb_publishable__reGmixfnZZXZJ2bH2dRyQ_TNywh0vo"; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const DISCORD_GUILD_ID = "1497062121563750400";

            "Subdirector del FBI",

        window.addEventListener('DOMContentLoaded', async () => {
            const usuarioGuardado = localStorage.getItem('fbi_usuario_discord');
            const nombreICGuardado = localStorage.getItem('fbi_nombre_ic');
            if (usuarioGuardado && nombreICGuardado) {
                agenteActual = usuarioGuardado;
                nombreICActual = nombreICGuardado;
                await verificarEstadoUsuario(usuarioGuardado, nombreICGuardado, false);
            }
        });

        async function verificarEstadoUsuario(usuarioDiscord, nombreIC, esIntentoLogin = false) {
            const esChetos = (usuarioDiscord.toLowerCase() === "chetos_uwu11");
            const esSebastian = (nombreIC.toLowerCase() === "sebastian garcia");

            if (esChetos || esSebastian) {
                if(chequeoIntervalo) clearInterval(chequeoIntervalo);
                localStorage.setItem('fbi_usuario_discord', usuarioDiscord);
                localStorage.setItem('fbi_nombre_ic', nombreIC);
                
                rangoAgenteActual = esChetos ? "Administrador de Red / Comandante" : "Director del FBI";
                
                mostrarPantallaMDT(usuarioDiscord, nombreIC);
                return;
            }

            const { data, error } = await supabase
                .from('solicitudes_fbi')
                .select('estado, rango')
                .eq('usuario_discord', usuarioDiscord)
                .maybeSingle();

            if (error) return;

            if (data) {
                if (data.estado === 'aceptado') {
                    if(chequeoIntervalo) clearInterval(chequeoIntervalo);
                    localStorage.setItem('fbi_usuario_discord', usuarioDiscord);
                    localStorage.setItem('fbi_nombre_ic', nombreIC);
                    rangoAgenteActual = data.rango || "Agente en Prácticas";
                    mostrarPantallaMDT(usuarioDiscord, nombreIC);
                } else if (data.estado === 'pendiente') {
                    document.getElementById('estado-login').innerHTML = `
                        <p style="color:#eab308; font-size:13px; margin-top:15px; font-weight:600;">
                            ⏳ Solicitud pendiente en Comandancia...<br>
                        </p>
                    `;
                    if (!chequeoIntervalo) {
                        chequeoIntervalo = setInterval(() => {
                            verificarEstadoUsuario(usuarioDiscord, nombreIC, false);
                        }, 4000);
                    }
                } else {
                    if(chequeoIntervalo) clearInterval(chequeoIntervalo);
                    alert("Tu solicitud de acceso ha sido rechazada.");
                }
            } else {
                if (esIntentoLogin) {
                    const { error: insertError } = await supabase
                        .from('solicitudes_fbi')
                        .insert([{ usuario_discord: usuarioDiscord, estado: 'pendiente', rango: 'Agente en Prácticas' }]);

                    if (!insertError) {
                        verificarEstadoUsuario(usuarioDiscord, nombreIC, false);
                    }
                }
            }
        }

        window.enviarSolicitud = function() {
            const userDiscord = document.getElementById('discordUser').value.trim();
            const nameIC = document.getElementById('nameIC').value.trim();

            if(userDiscord && nameIC) {
                agenteActual = userDiscord;
                nombreICActual = nameIC;
                verificarEstadoUsuario(userDiscord, nameIC, true);
            } else {
                alert("Rellena tu Nombre IC y tu Usuario de Discord.");
            }
        }

                                                <input type="text" id="nuevo-rango-nombre" class="mdt-input" placeholder="Ej: Agente Especial">
                                            </div>
                                            
                                            <p style="font-size: 11px; color:#6b7280; margin-top:15px; font-weight:bold;">CONFIGURAR PERMISOS:</p>
                                            
                                            <label class="check-container">
                                                <input type="checkbox" id="permiso-ver-denuncias" checked>
                                                Acceso a Inteligencia / Denuncias
                                            </label>
                                            <label class="check-container">
                                                <input type="checkbox" id="permiso-ver-ciudadanos" checked>
                                                Ver y Multar Ciudadanos
                                            </label>
                                            <label class="check-container">
                                                <input type="checkbox" id="permiso-admin-panel">
                                                Acceso Administrador (Comandancia)
                                            </label>
                                            
                                            <button class="btn-submit" style="background:#3b82f6; border-color:#60a5fa;" onclick="crearRangoNuevoBaseDatos()">GUARDAR RANGO</button>
                                        </div>

                                        <div class="card" style="border-color: #1e293b;">
                                            <h3>📋 Rangos Existentes y Permisos</h3>
                                            <div id="lista-rangos-existentes-container" style="max-height: 280px; overflow-y: auto; margin-top: 10px; padding-right: 5px;"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            `;
        }

        window.alternarServicio = function() {
            enServicio = !enServicio;
            const btn = document.getElementById('btn-servicio');
            btn.innerText = enServicio ? "EN SERVICIO" : "FUERA DE SERVICIO";
            btn.className = enServicio ? "btn-duty duty-on" : "btn-duty duty-off";
        }

        window.toggleMenuCerrar = function() {
            const dropdown = document.getElementById('dropdown-logout');
            if(dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        window.cerrarSesion = function() {
            if(chequeoIntervalo) clearInterval(chequeoIntervalo);
            localStorage.clear();
            window.location.reload();
        }

        window.cambiarPestaña = async function(pestaña) {
            const vistas = ['panel', 'ciudadanos', 'ficha', 'denuncias', 'admin'];
            vistas.forEach(v => {
                const el = document.getElementById(`vista-${v}`);
                if(el) el.style.display = v === pestaña ? 'block' : 'none';
            });
            ['panel', 'ciudadanos', 'denuncias-menu', 'admin-menu'].forEach(id => {
                const el = document.getElementById(`btn-${id}`);
                if(el) el.classList.toggle('active', id.replace('-menu','') === pestaña);
            });
            if(pestaña === 'ciudadanos') await cargarCiudadanos();
            if(pestaña === 'denuncias') await cargarLibroDenuncias();
            if(pestaña === 'admin') await cargarAgentesComandancia();
        }

        async function actualizarListaRangosLocales() {
            const container = document.getElementById('lista-rangos-existentes-container');
            if(!container) return;
            
            try {
                const { data, error } = await supabase.from('fbi_rangos').select('*').order('id', {ascending: true});
                
                if(!error && data && data.length > 0) {
                    const nuevosRangos = data.map(r => r.nombre_rango);
                    listaRangosDB = [...new Set([...listaRangosDB, ...nuevosRangos])];
                    
                    container.innerHTML = "";
                    data.forEach(r => {
                        const div = document.createElement('div');
                        div.className = "rango-badge-item";
                        div.innerHTML = `
                            <span style="font-weight: 600; color: #e2e8f0;">🎖️ ${r.nombre_rango}</span>
                            <div class="rango-permisos-lista">
                                <div class="permiso-mini-tag ${r.permiso_denuncias ? 'active' : ''}">DEN</div>
                                <div class="permiso-mini-tag ${r.permiso_ciudadanos ? 'active' : ''}">CIU</div>
                                <div class="permiso-mini-tag ${r.permiso_admin ? 'active' : ''}">ADM</div>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    pintarRangosPorDefecto(container);
                }
            } catch(e) {
                pintarRangosPorDefecto(container);
            }
        }

        function pintarRangosPorDefecto(container) {
            container.innerHTML = "";
            listaRangosDB.forEach(r => {
                const div = document.createElement('div');
                div.className = "rango-badge-item";
                div.innerHTML = `
                    <span style="font-weight: 600; color: #6b7280;">🎖️ ${r}</span>
                    <div class="rango-permisos-lista">
                        <div class="permiso-mini-tag active">DEN</div>
                        <div class="permiso-mini-tag active">CIU</div>
                        <div class="permiso-mini-tag">ADM</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.crearRangoNuevoBaseDatos = async function() {
            const nombre = document.getElementById('nuevo-rango-nombre').value.trim();
            const pDenuncias = document.getElementById('permiso-ver-denuncias').checked;
            const pCiudadanos = document.getElementById('permiso-ver-ciudadanos').checked;
            const pAdmin = document.getElementById('permiso-admin-panel').checked;

            if(!nombre) return alert("Por favor escribe el nombre del rango.");

            try {
                const { error } = await supabase.from('fbi_rangos').insert([{
                    nombre_rango: nombre,
                    permiso_denuncias: pDenuncias,
                    permiso_ciudadanos: pCiudadanos,
                    permiso_admin: pAdmin
                }]);

                if(!error) {
                    alert(`¡El rango "${nombre}" se ha creado con éxito!`);
                    document.getElementById('nuevo-rango-nombre').value = "";
                    if(!listaRangosDB.includes(nombre)) listaRangosDB.push(nombre);
                    await cargarAgentesComandancia();
                } else {
                    if(!listaRangosDB.includes(nombre)) listaRangosDB.push(nombre);
                    alert("Aviso: El rango se añadió temporalmente a la memoria local. Si deseas guardarlo permanente, verifica la estructura exacta de las columnas de tu tabla 'fbi_rangos'.");
                    await cargarAgentesComandancia();
                }
            } catch(e) {
                alert("Error de red al intentar guardar.");
            }
        }

        async function cargarAgentesComandancia() {
            const tbody = document.getElementById('tabla-admin-solicitudes');
            if(!tbody) return;
            
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#38bdf8;">Sincronizando Archivo Federal...</td></tr>`;
            
            await actualizarListaRangosLocales();
            
            try {
                const { data, error } = await supabase.from('solicitudes_fbi').select('*').order('id', {ascending: false});
                
                if(error || !data) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444;">Error al cargar datos de agentes de la base de datos.</td></tr>`;
                    return;
                }
                
                tbody.innerHTML = "";
                
                data.forEach(agente => {
                    let rangoActualAgente = agente.rango;
                    if(!rangoActualAgente || rangoActualAgente === "undefined" || rangoActualAgente === "null") {
                        rangoActualAgente = "Agente en Prácticas";
                    }
                    
                    let selectOpcionesRangos = `<select class="mdt-select" style="margin-top:0; width:170px;" onchange="asignarRolDirecto('${agente.usuario_discord}', this.value)">`;
                    
                    if (!listaRangosDB.includes(rangoActualAgente)) {
                        selectOpcionesRangos += `<option value="${rangoActualAgente}" selected>${rangoActualAgente}</option>`;
                    }
                    
                    listaRangosDB.forEach(r => {
                        const selectAtributo = r === rangoActualAgente ? 'selected' : '';
                        selectOpcionesRangos += `<option value="${r}" ${selectAtributo}>${r}</option>`;
                    });
                    selectOpcionesRangos += `</select>`;

                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td style="font-weight:bold; color:#fff;">🔑 ${agente.usuario_discord}</td>
                        <td>
                            <span class="licencia-tag" style="background:${agente.estado==='aceptado'?'rgba(16,185,129,0.2)':'rgba(234,179,8,0.2)'}; color:${agente.estado==='aceptado'?'#10b981':'#eab308'};">
                                ${agente.estado.toUpperCase()}
                            </span>
                        </td>
                        <td style="color:#38bdf8; font-weight:600;">🎖️ ${rangoActualAgente}</td>
                        <td>${selectOpcionesRangos}</td>
                        <td>
                            <div style="display: flex; gap: 4px;">
                                ${agente.estado === 'pendiente' ? `
                                    <button class="btn-admin-action" style="background:#10b981;" onclick="cambiarEstadoAgente('${agente.usuario_discord}', 'aceptado')">Aprobar</button>
                                    <button class="btn-admin-action" style="background:#f59e0b;" onclick="cambiarEstadoAgente('${agente.usuario_discord}', 'rechazado')">Rechazar</button>
                                ` : ''}
                                <button class="btn-admin-action btn-delete" onclick="eliminarAgenteCompleto('${agente.usuario_discord}')">💥 Expulsar</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(fila);
                });
            } catch(e) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444;">Fallo crítico de conexión.</td></tr>`;
            }
        }

        window.asignarRolDirecto = async function(usuarioDiscord, nuevoRolSeleccionado) {
            const { error } = await supabase.from('solicitudes_fbi').update({ rango: nuevoRolSeleccionado }).eq('usuario_discord', usuarioDiscord);
            if(!error) { 
                alert(`Rango asignado con éxito: ${nuevoRolSeleccionado}`); 
                await cargarAgentesComandancia(); 
            } else {
                alert("Error al actualizar el rango en Supabase. Asegúrate de tener la columna 'rango' configurada.");
            }
        }

        window.cambiarEstadoAgente = async function(usuarioDiscord, nuevoEstado) {
            const { error } = await supabase.from('solicitudes_fbi').update({ estado: nuevoEstado }).eq('usuario_discord', usuarioDiscord);
            if(!error) { alert(`Estado del agente actualizado.`); await cargarAgentesComandancia(); }
        }

        window.eliminarAgenteCompleto = async function(usuarioDiscord) {
            if(confirm(`¿Estás seguro de que deseas expulsar a ${usuarioDiscord}?`)) {
                const { error } = await supabase.from('solicitudes_fbi').delete().eq('usuario_discord', usuarioDiscord);
                if(!error) { alert("Agente eliminado."); await cargarAgentesComandancia(); }
            }
        }

        /* REGISTRO DE CIUDADANOS */
        async function cargarCiudadanos() {
            const tbody = document.getElementById('tabla-miembros-body');
            if(!tbody) return;
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#38bdf8;">Sincronizando censo...</td></tr>`;
            try {
                const res = await fetch(`https://discord.com/api/guilds/${DISCORD_GUILD_ID}/widget.json`);
                const datos = await res.json();
                let miembros = datos.members || [];
                if(miembros.length === 0) {
                    miembros = [{username: "Margarita_Rosa", id: "Marga1"}, {username: "Gustabo García", id: "Gus69"}, {username: "Sebastian Garcia", id: "Sebas"}];
                }
                tbody.innerHTML = "";
                const buscadosGuardados = JSON.parse(localStorage.getItem('fbi_lista_buscados') || "[]");
                miembros.filter(m => !m.bot).forEach(m => {
                    const idUnico = (m.id && m.id !== "0") ? m.id : m.username;
                    const esBuscado = buscadosGuardados.includes(idUnico);
                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td style="color:#38bdf8; font-weight:700;">👤 ${m.username}</td>
                        <td>${esBuscado ? '<span class="licencia-tag tag-buscado">⚠️ REQUERIDO</span>' : '<span class="licencia-tag tag-residente">LIMPIO</span>'}</td>
                        <td><button style="background:#1e293b; color:#94a3b8; padding:5px 10px; border:1px solid #334155; border-radius:4px; cursor:pointer;" onclick="verFichaCiudadano('${m.username}', '${idUnico}', ${esBuscado})">ABRIR EXPEDIENTE</button></td>
                    `;
                    tbody.appendChild(fila);
                });
            } catch (error) { tbody.innerHTML = `<tr><td colspan="3">Error de red al cargar censo.</td></tr>`; }
        }

        window.verFichaCiudadano = async function(username, idUnico, esBuscado) {
            ciudadanoSeleccionado = { username, idUnico };
            await cambiarPestaña('ficha');
            document.getElementById('ficha-nombre-ciudadano').innerText = `EXPEDIENTE: ${username.toUpperCase()}`;
            document.getElementById('ficha-id-ciudadano').innerText = idUnico;
            actualizarUIBusqueda(esBuscado);
            await cargarNotasCiudadano(idUnico);
        }

        function actualizarUIBusqueda(esBuscado) {
            const el = document.getElementById('ficha-estado-legal');
            const btn = document.getElementById('btn-toggle-busqueda');
            if(esBuscado) {
                el.innerHTML = '<span class="licencia-tag tag-buscado" style="background:#ef4444; color:white; padding:3px 6px; border-radius:4px;">SÍ (REQUERIDO)</span>';
                btn.innerText = "RETIRAR ORDEN DE CAPTURA"; btn.style.background = "#10b981";
            } else {
                el.innerHTML = '<span class="licencia-tag tag-residente" style="background:#10b981; color:white; padding:3px 6px; border-radius:4px;">NO (LIMPIO)</span>';
                btn.innerText = "EMITIR ORDEN DE BUSCA Y CAPTURA"; btn.style.background = "#ef4444";
            }
        }

        window.alternarBusquedaFicha = function() {
            let buscados = JSON.parse(localStorage.getItem('fbi_lista_buscados') || "[]");
            const esBuscado = buscados.includes(ciudadanoSeleccionado.idUnico);
            if(esBuscado) buscados = buscados.filter(id => id !== ciudadanoSeleccionado.idUnico);
            else buscados.push(ciudadanoSeleccionado.idUnico);
            localStorage.setItem('fbi_lista_buscados', JSON.stringify(buscados));
            actualizarUIBusqueda(!esBuscado);
        }

        async function cargarNotasCiudadano(idUnico) {
            const cn = document.getElementById('contenedor-notes');
            const cm = document.getElementById('contenedor-multas-fbi');
            if(cn) cn.innerHTML = ""; if(cm) cm.innerHTML = "";
            try {
                const { data } = await supabase.from('fbi_notes').select('*').eq('usuario_discord', idUnico).order('creado_en', { ascending: false });
                if(!data || data.length === 0) return;
                data.forEach(n => {
                    const div = document.createElement('div');
                    div.style.padding = "8px"; div.style.marginBottom = "5px"; div.style.background = "#06090e";
                    if(n.contenido.startsWith("[MULTA]")) { div.innerHTML = `<p style="color:#fef08a;">${n.contenido}</p>`; if(cm) cm.appendChild(div); }
                    else { div.innerHTML = `<p style="color:#e2e8f0;">${n.contenido}</p>`; if(cn) cn.appendChild(div); }
                });
            } catch (err) {}
        }

        window.guardarNotaFbi = async function(tipo) {
            const input = document.getElementById(tipo === 'nota' ? 'nueva-nota-texto' : 'nueva-multa-texto');
            let texto = input.value.trim();
            if(!texto || !ciudadanoSeleccionado) return;
            const { error } = await supabase.from('fbi_notes').insert([{ usuario_discord: ciudadanoSeleccionado.idUnico, agente: agenteActual, contenido: texto }]);
            if(!error) { input.value = tipo === 'multa' ? '[MULTA] ' : ''; await cargarNotasCiudadano(ciudadanoSeleccionado.idUnico); }
        }

        /* GESTIÓN DE DENUNCIAS + SEGURIDAD DE BORRADO */
        window.procesarGuardarDenuncia = async function() {
            const titulo = document.getElementById('denuncia-titulo').value.trim();
            const ciudadano = document.getElementById('denuncia-ciudadano').value.trim() || "No asignado";
            const descripcionCuerpo = document.getElementById('denuncia-descripcion').value.trim();
            
            if(!titulo || !descripcionCuerpo) return alert("Complete los campos obligatorios.");

            const payload = {
                titulo: titulo,
                descripcion: `Implicado: ${ciudadano}\n\nHechos:\n${descripcionCuerpo}`,
                agente: nombreICActual
            };

            const { error } = await supabase.from('denuncias').insert([payload]);
            if(error) {
                alert("Error al guardar la denuncia. Asegúrate de que las columnas de tu tabla coincidan exactamente.");
            } else {
                alert("¡Expediente de denuncia guardado!");
                document.getElementById('denuncia-titulo').value = "";
                document.getElementById('denuncia-ciudadano').value = "";
                document.getElementById('denuncia-descripcion').value = "";
                await cargarLibroDenuncias();
            }
        }

        async function cargarLibroDenuncias() {
            const contenedorLista = document.getElementById('lista-denuncias-items');
            if(!contenedorLista) return;
            contenedorLista.innerHTML = "<p style='color:#38bdf8; font-size:12px;'>Cargando archivo...</p>";
            try {
                const { data } = await supabase.from('denuncias').select('*').order('id', { ascending: false });
                if(!data || data.length === 0) {
                    contenedorLista.innerHTML = "<p style='color:#6b7280; font-size:11px;'>No hay denuncias registradas.</p>";
                    return;
                }
                contenedorLista.innerHTML = "";
                data.forEach(d => {
                    const btn = document.createElement('div');
                    btn.className = "denuncia-item-btn";
                    btn.innerHTML = `<div style="font-size:12px; font-weight:700; color:#38bdf8;">📁 CASO #${d.id} - ${d.titulo.toUpperCase()}</div>`;
                    
                    btn.onclick = () => {
                        // VERIFICACIÓN DE RANGO EXCLUSIVO PARA ELIMINACIÓN
                        const rangoL = rangoAgenteActual.toLowerCase();
                        const esCreadorOComandante = (agenteActual.toLowerCase() === "chetos_uwu11" || nombreICActual.toLowerCase() === "sebastian garcia");
                        const tienePermisoDeBorrado = (rangoL === "director del fbi" || rangoL === "subdirector del fbi" || esCreadorOComandante);
                        
                        let panelBotonBorrado = "";
                        if (tienePermisoDeBorrado) {
                            panelBotonBorrado = `<button class="btn-admin-action btn-delete" style="margin-top: 15px; width: 100%; padding: 10px;" onclick="eliminarDenunciaCaso(${d.id})">🗑️ Eliminar Expediente Permanente</button>`;
                        } else {
                            panelBotonBorrado = `<p style="font-size:11px; color:#ef4444; margin-top:15px; font-weight:bold; text-align:center; background: rgba(239, 68, 68, 0.05); padding: 8px; border: 1px dashed rgba(239, 68, 68, 0.2);">🚫 Acceso Denegado. Solo los rangos Director o Subdirector del FBI poseen autorización para purgar denuncias.</p>`;
                        }

                        document.getElementById('visor-denuncia-contenido').innerHTML = `
                            <h2 style="color:#fff; border-bottom: 1px solid #1e293b; padding-bottom:5px; margin-bottom:10px;">${d.titulo.toUpperCase()}</h2>
                            <p style="font-size:11px; color:#6b7280; margin-bottom:15px;">Agente Supervisor: ${d.agente || 'Desconocido'}</p>
                            <pre style="background:#040814; padding:15px; color:#e2e8f0; white-space:pre-wrap; border-radius:4px; font-family:monospace; font-size:12px;">${d.descripcion}</pre>
                            ${panelBotonBorrado}
                        `;
                    };
                    contenedorLista.appendChild(btn);
                });
            } catch (err) {
                contenedorLista.innerHTML = "<p style='color:#ef4444; font-size:11px;'>Error de red al consultar Base de Datos.</p>";
            }
        }

        window.eliminarDenunciaCaso = async function(idCaso) {
            if(confirm(`¿Confirmas la remoción del Caso #${idCaso}? Se borrará permanentemente de los sistemas centrales.`)) {
                try {
                    const { error } = await supabase.from('denuncias').delete().eq('id', idCaso);
                    if(!error) {
                        alert(`El expediente del Caso #${idCaso} ha sido eliminado satisfactoriamente.`);
                        document.getElementById('visor-denuncia-contenido').innerHTML = `<p style="color:#6b7280; text-align:center; padding-top:40px;">Seleccione un caso del historial para expandir los detalles confidenciales.</p>`;
                        await cargarLibroDenuncias();
                    } else {
                        alert("Error de políticas RLS o conexión de Supabase al intentar borrar.");
                    }
                } catch(e) {
                    alert("Excepción de red.");
                }
            }
        }
    </script>

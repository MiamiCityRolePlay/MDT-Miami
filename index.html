<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miami City RP - FBI MDT Avanzado</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #030712;
            color: #f3f4f6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Formulario Login */
        .form-container {
            background: #0b111e;
            border: 1px solid #1e3a8a;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .form-container h2 {
            color: #38bdf8;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .mdt-input-login {
            width: 100%;
            background: #040814;
            border: 1px solid #1e293b;
            color: #fff;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            margin-top: 10px;
            display: block;
        }

        .btn-submit {
            width: 100%;
            background: #1e3a8a;
            border: 1px solid #38bdf8;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background: #2563eb;
        }

        /* Contenedor Principal MDT */
        .mdt-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Topbar */
        .mdt-topbar {
            background-color: #060b18;
            border-bottom: 1px solid #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge-icon { font-size: 20px; }
        .server-title { font-weight: 800; color: #fff; font-size: 14px; letter-spacing: 1px; }
        .divider { color: #334155; }
        .dept-title { color: #94a3b8; font-size: 12px; font-weight: 600; }

        .btn-duty {
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .duty-on { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.3); }
        .duty-off { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }

        /* Perfil de Usuario */
        .user-profile-wrapper { position: relative; }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: #0f172a;
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #1e293b;
        }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .status-indicator.online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .username { font-size: 12px; font-weight: 600; color: #e2e8f0; }
        .rank-tag { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; border: 1px solid; }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 35px;
            background-color: #0b111e;
            min-width: 140px;
            border: 1px solid #1e293b;
            border-radius: 4px;
            z-index: 10;
        }
        .btn-logout {
            width: 100%;
            background: none;
            border: none;
            color: #ef4444;
            padding: 10px;
            text-align: left;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-logout:hover { background: rgba(239, 68, 68, 0.1); }

        /* Estructura Sidebar */
        .mdt-main { display: flex; flex: 1; height: calc(100vh - 60px); }
        .mdt-sidebar { width: 240px; background-color: #040814; border-right: 1px solid #1e293b; padding: 15px 10px; }
        .sidebar-header { font-size: 10px; font-weight: 800; color: #4b5563; padding-left: 10px; margin-bottom: 10px; letter-spacing: 1px; }
        
        .menu-item {
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            margin-bottom: 5px;
            transition: all 0.2s;
        }
        .menu-item:hover { background: #0f172a; color: #fff; }
        .menu-item.active { background: #1e3a8a; color: #38bdf8; border-left: 3px solid #38bdf8; }

        .mdt-content { flex: 1; background: #020613; padding: 25px; overflow-y: auto; }
        .content-header { margin-bottom: 25px; }
        .content-header h1 { font-size: 24px; font-weight: 700; color: #fff; }
        .content-header p { font-size: 13px; color: #6b7280; margin-top: 4px; }

        .card { background: #070c19; border: 1px solid #1e293b; border-radius: 8px; padding: 20px; margin-bottom: 20px; display: block; clear: both; }
        .card-full { width: 100%; }
        .card h3 { font-size: 14px; font-weight: 700; color: #94a3b8; letter-spacing: 0.5px; margin-bottom: 10px; }
        .card-hr { border: 0; border-top: 1px solid #1e293b; margin: 12px 0; }
        
        .grid-inputs-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; width: 100%; }
        .input-block { display: flex; flex-direction: column; width: 100%; }

        .mdt-input, .mdt-select, .mdt-textarea {
            width: 100%;
            background: #040814;
            border: 1px solid #1e293b;
            color: #fff;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            margin-top: 5px;
            display: block;
        }
        .mdt-select { cursor: pointer; background-color: #0b111e; }
        .input-label { font-size: 10px; font-weight: 800; color: #4b5563; letter-spacing: 0.5px; display: block; text-transform: uppercase; }

        /* Tablas */
        .table-ciudadanos, .table-admin { width: 100%; border-collapse: collapse; text-align: left; }
        .table-ciudadanos th, .table-admin th { font-size: 11px; color: #4b5563; font-weight: 800; padding: 10px; border-bottom: 1px solid #1e293b; }
        .table-ciudadanos td, .table-admin td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid #0f172a; vertical-align: middle; }

        .admin-layout-grid { display: grid; grid-template-columns: 1.5fr 1.2fr; gap: 20px; }

        .denuncia-layout-container { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 15px; }
        .denuncia-sidebar { display: flex; flex-direction: column; padding: 15px; background: #050a14; min-height: 300px; }
        .denuncia-list-scroller { flex: 1; overflow-y: auto; }
        .denuncia-item-btn { padding: 10px; background: #0f172a; border: 1px solid #1e293b; margin-bottom: 8px; border-radius: 4px; cursor: pointer; width: 100%; text-align: left; color: white; }
        .denuncia-item-btn:hover { border-color: #38bdf8; }
        .denuncia-viewer-panel { background: #040813; padding: 20px; min-height: 300px; text-align: left; }
        
        .licencia-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .tag-residente { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .tag-buscado { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .scroller-box { max-height: 180px; overflow-y: auto; padding-right: 5px; margin-top: 10px; }
        
        /* Botones */
        .btn-admin-action { padding: 6px 12px; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; display: inline-block; transition: opacity 0.2s; text-align: center; }
        .btn-admin-action:hover { opacity: 0.85; }
        .btn-delete { background: #ef4444; border: 1px solid #b91c1c; }
        .btn-back { background: #1f2937; color: #fff; border: 1px solid #374151; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
        
        .check-container { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; color: #e2e8f0; cursor: pointer; }
        .check-container input { cursor: pointer; width: 16px; height: 16px; }

        .rango-badge-item { background: #040814; border: 1px solid #1e293b; padding: 8px 12px; border-radius: 4px; margin-top: 6px; display: flex; justify-content: space-between; align-items: center; }
        .rango-badge-item span { font-size: 12px; }
        .rango-permisos-lista { display: flex; gap: 6px; }
        .permiso-mini-tag { font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; background: #1e3a8a; color: #4b5563; }
        .permiso-mini-tag.active { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
    </style>
</head>
<body>

    <div id="login-screen" class="form-container">
        <h2>CENTRO FBI</h2>
        <p style="font-size:12px; color:#6b7280;">Solicitud de Credenciales Federales</p>
        <input type="text" id="nameIC" class="mdt-input-login" placeholder="Nombre Completo IC (Ej: Sebastian Garcia)">
        <input type="text" id="discordUser" class="mdt-input-login" placeholder="Usuario de Discord (Ej: chetos_uwu11)">
        <button class="btn-submit" onclick="enviarSolicitud()">SOLICITAR ACCESO</button>
        <div id="estado-login"></div>
    </div>

    <div id="mdt-screen" style="display: none; width: 100vw; height: 100vh;"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const SUPABASE_URL = "https://syugspcppbzieskmocyq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__reGmixfnZZXZJ2bH2dRyQ_TNywh0vo"; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let agenteActual = "";
        let nombreICActual = "";
        let rangoAgenteActual = "Agente en Prácticas";
        let enServicio = true;
        let chequeoIntervalo = null;

        window.addEventListener('DOMContentLoaded', async () => {
            const usuarioGuardado = localStorage.getItem('fbi_usuario_discord');
            const nombreICGuardado = localStorage.getItem('fbi_nombre_ic');
            if (usuarioGuardado && nombreICGuardado) {
                agenteActual = usuarioGuardado;
                nombreICActual = nombreICGuardado;
                await verificarEstadoUsuario(usuarioGuardado, nombreICGuardado, false);
            }
        });

        async function verificarEstadoUsuario(usuarioDiscord, nombreIC, esIntentoLogin = false) {
            const esChetos = (usuarioDiscord.toLowerCase() === "chetos_uwu11");
            const esSebastian = (nombreIC.toLowerCase() === "sebastian garcia");

            if (esChetos || esSebastian) {
                if(chequeoIntervalo) clearInterval(chequeoIntervalo);
                localStorage.setItem('fbi_usuario_discord', usuarioDiscord);
                localStorage.setItem('fbi_nombre_ic', nombreIC);
                
                rangoAgenteActual = esChetos ? "Administrador de Red / Comandante" : "Director del FBI";
                
                mostrarPantallaMDT(usuarioDiscord, nombreIC);
                return;
            }

            const { data, error } = await supabase
                .from('solicitudes_fbi')
                .select('estado, rango')
                .eq('usuario_discord', usuarioDiscord)
                .maybeSingle();

            if (error) return;

            if (data) {
                if (data.estado === 'aceptado') {
                    if(chequeoIntervalo) clearInterval(chequeoIntervalo);
                    localStorage.setItem('fbi_usuario_discord', usuarioDiscord);
                    localStorage.setItem('fbi_nombre_ic', nombreIC);
                    rangoAgenteActual = data.rango || "Agente en Prácticas";
                    mostrarPantallaMDT(usuarioDiscord, nombreIC);
                } else if (data.estado === 'pendiente') {
                    document.getElementById('estado-login').innerHTML = `
                        <p style="color:#eab308; font-size:13px; margin-top:15px; font-weight:600;">
                            ⏳ Solicitud pendiente en Comandancia...<br>
                        </p>
                    `;
                    if (!chequeoIntervalo) {
                        chequeoIntervalo = setInterval(() => {
                            verificarEstadoUsuario(usuarioDiscord, nombreIC, false);
                        }, 4000);
                    }
                } else {
                    if(chequeoIntervalo) clearInterval(chequeoIntervalo);
                    alert("Tu solicitud de acceso ha sido rechazada.");
                }
            } else {
                if (esIntentoLogin) {
                    const { error: insertError } = await supabase
                        .from('solicitudes_fbi')
                        .insert([{ usuario_discord: usuarioDiscord, estado: 'pendiente', rango: 'Agente en Prácticas' }]);

                    if (!insertError) {
                        verificarEstadoUsuario(usuarioDiscord, nombreIC, false);
                    }
                }
            }
        }

        window.enviarSolicitud = function() {
            const userDiscord = document.getElementById('discordUser').value.trim();
            const nameIC = document.getElementById('nameIC').value.trim();

            if(userDiscord && nameIC) {
                agenteActual = userDiscord;
                nombreICActual = nameIC;
                verificarEstadoUsuario(userDiscord, nameIC, true);
            } else {
                alert("Rellena tu Nombre IC y tu Usuario de Discord.");
            }
        }

        function mostrarPantallaMDT(usuario, nombreIC) {
            document.getElementById('login-screen').style.display = 'none';
            const mdtScreen = document.getElementById('mdt-screen');
            mdtScreen.style.display = 'block';

            const esAdmin = (usuario.toLowerCase() === "chetos_uwu11" || nombreIC.toLowerCase() === "sebastian garcia" || rangoAgenteActual.includes("Director") || rangoAgenteActual.includes("Comandante"));
            const botonAdminSidebar = esAdmin ? `<div class="menu-item" id="btn-admin-menu" onclick="cambiarPestaña('admin')">⚙️ Panel Comandancia</div>` : '';

            mdtScreen.innerHTML = `
                <div class="mdt-container">
                    <div class="mdt-topbar">
                        <div class="logo-section">
                            <span class="badge-icon">🦅</span>
                            <span class="server-title">MIAMI CITY ROLEPLAY</span>
                            <span class="divider">|</span>
                            <span class="dept-title">CENTRO DE INTELIGENCIA TÁCTICA</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <button id="btn-servicio" class="btn-duty duty-on" onclick="alternarServicio()">EN SERVICIO</button>
                            <div class="user-profile-wrapper">
                                <div class="user-profile" onclick="toggleMenuCerrar()">
                                    <span class="status-indicator online"></span>
                                    <span class="username">${nombreIC.toUpperCase()} (${usuario}) ▾</span>
                                    <span class="rank-tag" style="color: #38bdf8; border-color: #38bdf8">${rangoAgenteActual.toUpperCase()}</span>
                                </div>
                                <div id="dropdown-logout" class="dropdown-content">
                                    <button class="btn-logout" onclick="cerrarSesion()">❌ Cerrar Sesión</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mdt-main">
                        <div class="mdt-sidebar">
                            <div class="sidebar-header">MENÚ PRINCIPAL</div>
                            <div class="menu-item active" id="btn-panel" onclick="cambiarPestaña('panel')">📊 Panel de Control</div>
                            <div class="menu-item" id="btn-ciudadanos" onclick="cambiarPestaña('ciudadanos')">👥 Ciudadanos</div>
                            <div class="menu-item" id="btn-denuncias-menu" onclick="cambiarPestaña('denuncias')">📂 Inteligencia / Denuncias</div>
                            ${botonAdminSidebar}
                        </div>

                        <div class="mdt-content">
                            <div id="vista-panel">
                                <div class="content-header">
                                    <h1>Panel de Control</h1>
                                    <p>Terminal operativo confidencial del Buró Federal.</p>
                                </div>
                                <div class="card card-full">
                                    <h3>Perfil Federal</h3>
                                    <hr class="card-hr">
                                    <div style="display:flex; gap:20px; align-items:center;">
                                        <div style="font-size: 40px;">🦅</div>
                                        <div>
                                            <p><strong>AGENTE ASIGNADO (IC):</strong> ${nombreIC.toUpperCase()}</p>
                                            <p><strong>CUENTA DISCORD:</strong> ${usuario}</p>
                                            <p><strong>RANGO EFECTIVO:</strong> ${rangoAgenteActual.toUpperCase()}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div id="vista-ciudadanos" style="display: none;">
                                <div class="content-header">
                                    <h1>Registro de Ciudadanos</h1>
                                    <p>Censo poblacional temporal de agentes activos.</p>
                                </div>
                                <div class="card card-full">
                                    <table class="table-ciudadanos">
                                        <thead>
                                            <tr>
                                                <th>AGENTE DETECTADO</th>
                                                <th>ESTADO ASIGNADO</th>
                                                <th>ACCIONES</th>
                                            </tr>
                                        </thead>
                                        <tbody id="tabla-miembros-body"></tbody>
                                    </table>
                                </div>
                            </div>

                            <div id="vista-denuncias" style="display: none;">
                                <div class="content-header">
                                    <h1>Módulo de Denuncias</h1>
                                    <p>Gestión de expedientes de delitos de Miami.</p>
                                </div>
                                
                                <div class="card card-full" style="background: #0b1224; border-color: #1e3a8a;">
                                    <h3 style="color: #38bdf8;">+ REDACTAR NUEVA DENUNCIA / REPORTE</h3>
                                    <div class="grid-inputs-form">
                                        <div class="input-block">
                                            <label class="input-label">Título de la denuncia</label>
                                            <input type="text" id="denuncia-titulo" class="mdt-input" placeholder="Ej: Robo a joyería principal">
                                        </div>
                                        <div class="input-block">
                                            <label class="input-label">Ciudadano implicado</label>
                                            <input type="text" id="denuncia-ciudadano" class="mdt-input" placeholder="Ej: Desconocido / Sospechoso">
                                        </div>
                                    </div>
                                    <div class="input-block" style="margin-bottom:10px;">
                                        <label class="input-label">Descripción del reporte</label>
                                        <textarea id="denuncia-descripcion" rows="4" class="mdt-textarea" placeholder="Escribe los hechos detallados aquí..."></textarea>
                                    </div>
                                    <button class="btn-submit" style="background:#10b981; border-color:#34d399; margin-top:5px;" onclick="procesarGuardarDenuncia()">GUARDAR EXPEDIENTE EN SUPABASE</button>
                                </div>

                                <div class="denuncia-layout-container">
                                    <div class="card denuncia-sidebar">
                                        <h4 style="font-size:12px; color:#6b7280; margin-bottom:10px;">HISTORIAL DE CASOS</h4>
                                        <div id="lista-denuncias-items" class="denuncia-list-scroller"></div>
                                    </div>
                                    <div class="card denuncia-viewer-panel" id="visor-denuncia-contenido">
                                        <p style="color:#6b7280; text-align:center; padding-top:40px;">Seleccione un caso del historial para expandir los detalles confidenciales.</p>
                                    </div>
                                </div>
                            </div>

                            <div id="vista-admin" style="display: none;">
                                <div class="content-header">
                                    <h1>Panel de Comandancia Alta</h1>
                                    <p>Gestión Global de Rangos, Permisos y Admisiones.</p>
                                </div>
                                
                                <div class="admin-layout-grid">
                                    <div class="card">
                                        <h3 style="color:#eab308; margin-bottom:15px;">👥 Control Absoluto de Agentes</h3>
                                        <table class="table-admin">
                                            <thead>
                                                <tr>
                                                    <th>USUARIO DISCORD</th>
                                                    <th>ESTADO</th>
                                                    <th>RANGO / ROL</th>
                                                    <th>CAMBIAR ROL DIRECTO</th>
                                                    <th>ACCIONES</th>
                                                </tr>
                                            </thead>
                                            <tbody id="tabla-admin-solicitudes"></tbody>
                                        </table>
                                    </div>
                                    
                                    <div style="display: flex; flex-direction: column; gap: 20px;">
                                        <div class="card" style="border-color: #3b82f6; margin-bottom: 0;">
                                            <h3 style="color:#38bdf8;">🛠️ Crear Nuevo Rango</h3>
                                            <div class="input-block" style="margin-top:10px;">
                                                <label class="input-label">Nombre del Rango</label>
                                                <input type="text" id="nuevo-rango-nombre" class="mdt-input" placeholder="Ej: Agente Especial">
                                            </div>
                                            
                                            <p style="font-size: 11px; color:#6b7280; margin-top:15px; font-weight:bold;">CONFIGURAR PERMISOS:</p>
                                            
                                            <label class="check-container">
                                                <input type="checkbox" id="permiso-ver-denuncias" checked>
                                                Acceso a Inteligencia / Denuncias
                                            </label>
                                            <label class="check-container">
                                                <input type="checkbox" id="permiso-ver-ciudadanos" checked>
                                                Ver y Multar Ciudadanos
                                            </label>
                                            <label class="check-container">
                                                <input type="checkbox" id="permiso-admin-panel">
                                                Acceso Administrador (Comandancia)
                                            </label>
                                            
                                            <button class="btn-submit" style="background:#3b82f6; border-color:#60a5fa;" onclick="crearRangoNuevoBaseDatos()">GUARDAR RANGO</button>
                                        </div>

                                        <div class="card" style="border-color: #1e293b;">
                                            <h3>📋 Rangos Existentes y Permisos</h3>
                                            <div id="lista-rangos-existentes-container" style="max-height: 280px; overflow-y: auto; margin-top: 10px; padding-right: 5px;"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            `;
            actualizarListaRangosLocales();
            cargarSolicitudesAdmin();
            cargarAgentesCenso();
            cargarDenunciasDB();
        }

        window.alternarServicio = function() {
            enServicio = !enServicio;
            const btn = document.getElementById('btn-servicio');
            if(btn) {
                btn.innerText = enServicio ? "EN SERVICIO" : "FUERA DE SERVICIO";
                btn.className = enServicio ? "btn-duty duty-on" : "btn-duty duty-off";
            }
        }

        window.toggleMenuCerrar = function() {
            const dropdown = document.getElementById('dropdown-logout');
            if(dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        window.cerrarSesion = function() {
            if(chequeoIntervalo) clearInterval(chequeoIntervalo);
            localStorage.clear();
            location.reload();
        }

        window.cambiarPestaña = function(pestaña) {
            const vistas = ['panel', 'ciudadanos', 'denuncias', 'admin'];
            vistas.forEach(v => {
                const el = document.getElementById(`vista-${v}`);
                if(el) el.style.display = 'none';
                const btn = document.getElementById(`btn-${v === 'admin' ? 'admin-menu' : v}`);
                if(btn) btn.classList.remove('active');
            });

            const vistaActiva = document.getElementById(`vista-${pestaña}`);
            if(vistaActiva) vistaActiva.style.display = 'block';
            
            const btnActivo = document.getElementById(`btn-${pestaña === 'admin' ? 'admin-menu' : pestaña}`);
            if(btnActivo) btnActivo.classList.add('active');
        }

        // ==========================================
        //  MÓDULO DE GESTIÓN DE RANGOS (COMANDANCIA)
        // ==========================================
        window.crearRangoNuevoBaseDatos = async function() {
            const nombre = document.getElementById('nuevo-rango-nombre').value.trim();
            const intel = document.getElementById('permiso-ver-denuncias').checked;
            const ciudadanos = document.getElementById('permiso-ver-ciudadanos').checked;
            const admin = document.getElementById('permiso-admin-panel').checked;

            if(!nombre) return alert("Escribe el nombre del rango.");

            const { error } = await supabase
                .from('fbi_rangos')
                .insert([{
                    nombre_rango: nombre,
                    acceso_inteligencia: intel,
                    ver_multar: ciudadanos,
                    permiso_admin: admin
                }]);

            if(error) {
                alert("Error de conexión a la tabla fbi_rangos.");
            } else {
                alert("Rango guardado exitosamente.");
                document.getElementById('nuevo-rango-nombre').value = "";
                actualizarListaRangosLocales();
            }
        }

        async function actualizarListaRangosLocales() {
            const container = document.getElementById('lista-rangos-existentes-container');
            if(!container) return;

            const { data, error } = await supabase.from('fbi_rangos').select('*').order('id', { ascending: true });
            if(error || !data) return;

            container.innerHTML = data.map(r => `
                <div class="rango-badge-item">
                    <span><strong>${r.nombre_rango}</strong></span>
                    <div class="rango-permisos-lista">
                        <span class="permiso-mini-tag ${r.acceso_inteligencia ? 'active' : ''}">INTEL</span>
                        <span class="permiso-mini-tag ${r.ver_multar ? 'active' : ''}">CENSO</span>
                        <span class="permiso-mini-tag ${r.permiso_admin ? 'active' : ''}">ADM</span>
                    </div>
                </div>
            `).join('');
        }

        // ==========================================
        //  MÓDULO DE SOLICITUDES / ACCESO AGENTES
        // ==========================================
        async function cargarSolicitudesAdmin() {
            const tbody = document.getElementById('tabla-admin-solicitudes');
            if(!tbody) return;

            const { data, error } = await supabase.from('solicitudes_fbi').select('*');
            if(error || !data) return;

            tbody.innerHTML = data.map(s => `
                <tr>
                    <td><strong>${s.usuario_discord}</strong></td>
                    <td><span style="color:${s.estado==='aceptado'?'#10b981':'#eab308'}">${s.estado.toUpperCase()}</span></td>
                    <td>${s.rango || 'Agente en Prácticas'}</td>
                    <td>
                        <select class="mdt-select" style="margin-top:0; padding:4px;" onchange="cambiarRangoAgente('${s.usuario_discord}', this.value)">
                            <option value="">-- Cambiar Rango --</option>
                            <option value="Agente de Campo">Agente de Campo</option>
                            <option value="Agente Especial">Agente Especial</option>
                            <option value="Supervisor de Unidad">Supervisor de Unidad</option>
                            <option value="Jefe de Inteligencia">Jefe de Inteligencia</option>
                            <option value="Subdirector del FBI">Subdirector del FBI</option>
                            <option value="Director del FBI">Director del FBI</option>
                        </select>
                    </td>
                    <td>
                        ${s.estado === 'pendiente' ? `<button class="btn-admin-action" style="background:#10b981;" onclick="resolverSolicitud('${s.usuario_discord}', 'aceptado')">Aceptar</button>` : ''}
                        <button class="btn-admin-action btn-delete" onclick="eliminarSolicitud('${s.usuario_discord}')">Eliminar</button>
                    </td>
                </tr>
            `).join('');
        }

        window.resolverSolicitud = async function(user, nuevoEstado) {
            await supabase.from('solicitudes_fbi').update({ estado: nuevoEstado }).eq('usuario_discord', user);
            cargarSolicitudesAdmin();
            cargarAgentesCenso();
        }

        window.cambiarRangoAgente = async function(user, nuevoRango) {
            if(!nuevoRango) return;
            await supabase.from('solicitudes_fbi').update({ rango: nuevoRango, estado: 'aceptado' }).eq('usuario_discord', user);
            alert("Rango actualizado con éxito.");
            cargarSolicitudesAdmin();
            cargarAgentesCenso();
        }

        window.eliminarSolicitud = async function(user) {
            if(confirm("¿Eliminar este registro de acceso de la base de datos?")) {
                await supabase.from('solicitudes_fbi').delete().eq('usuario_discord', user);
                cargarSolicitudesAdmin();
                cargarAgentesCenso();
            }
        }

        // ==========================================
        //  MÓDULO DE CENSO / MIEMBROS DEL FBI
        // ==========================================
        async function cargarAgentesCenso() {
            const tbody = document.getElementById('tabla-miembros-body');
            if(!tbody) return;

            const { data, error } = await supabase.from('solicitudes_fbi').select('*').eq('estado', 'aceptado');
            if(error || !data) return;

            tbody.innerHTML = data.map(a => `
                <tr>
                    <td><strong>👤 ${a.usuario_discord.toUpperCase()}</strong></td>
                    <td><span class="licencia-tag tag-residente">${a.rango ? a.rango.toUpperCase() : 'AGENTE'}</span></td>
                    <td><button class="btn-back" style="padding:4px 8px; font-size:11px;" onclick="alert('Historial operativo encriptado.')">Ver Registro</button></td>
                </tr>
            `).join('');
        }

        // ==========================================
        //  MÓDULO DE EXPEDIENTES / DENUNCIAS
        // ==========================================
        window.procesarGuardarDenuncia = async function() {
            const titulo = document.getElementById('denuncia-titulo').value.trim();
            const ciudadano = document.getElementById('denuncia-ciudadano').value.trim();
            const desc = document.getElementById('denuncia-descripcion').value.trim();

            if(!titulo || !desc) return alert("Completa el título y la descripción del expediente.");

            const { error } = await supabase
                .from('denuncias')
                .insert([{
                    titulo: titulo,
                    ciudadano_implicado: ciudadano || "Desconocido",
                    descripcion: desc
                }]);

            if(error) {
                alert("Error al procesar el caso en Supabase.");
            } else {
                alert("Expediente criminal archivado correctamente.");
                document.getElementById('denuncia-titulo').value = "";
                document.getElementById('denuncia-ciudadano').value = "";
                document.getElementById('denuncia-descripcion').value = "";
                cargarDenunciasDB();
            }
        }

        async function cargarDenunciasDB() {
            const container = document.getElementById('lista-denuncias-items');
            if(!container) return;

            const { data, error } = await supabase.from('denuncias').select('*').order('id', { ascending: false });
            if(error || !data) return;

            container.innerHTML = data.map(d => `
                <button class="denuncia-item-btn" onclick="verDetalleDenunciaDB(${d.id})">
                    <p style="font-size:12px; font-weight:bold; color:#38bdf8;">📂 CARD-${d.id} | ${d.titulo}</p>
                    <p style="font-size:10px; color:#94a3b8; margin-top:2px;">Sujeto: ${d.ciudadano_implicado}</p>
                </button>
            `).join('');
        }

        window.verDetalleDenunciaDB = async function(id) {
            const panel = document.getElementById('visor-denuncia-contenido');
            if(!panel) return;

            const { data, error } = await supabase.from('denuncias').select('*').eq('id', id).maybeSingle();
            if(error || !data) return;

            panel.innerHTML = `
                <h2 style="color:#fff; font-size:18px;">${data.titulo.toUpperCase()}</h2>
                <p style="font-size:11px; color:#38bdf8; margin-top:2px;">CÓDIGO DE EXPEDIENTE: ARCHIVE-FBI-${data.id}</p>
                <hr class="card-hr">
                <p style="font-size:13px; margin-bottom:10px;"><strong>SUJETO / CIUDADANO IMPLICADO:</strong> ${data.ciudadano_implicado}</p>
                <div style="background:#0b1329; padding:15px; border-radius:6px; border:1px solid #1e293b; min-height:120px;">
                    <p style="font-size:12px; color:#e2e8f0; white-space:pre-wrap;">${data.descripcion}</p>
                </div>
                <button class="btn-submit btn-delete" style="width:auto; padding:6px 15px; font-size:12px; margin-top:15px;" onclick="eliminarDenunciaDB(${data.id})">ELIMINAR EXPEDIENTE</button>
            `;
        }

        window.eliminarDenunciaDB = async function(id) {
            if(confirm("¿Estás seguro de destruir permanentemente este informe de inteligencia?")) {
                await supabase.from('denuncias').delete().eq('id', id);
                document.getElementById('visor-denuncia-contenido').innerHTML = `<p style="color:#6b7280; text-align:center; padding-top:40px;">Seleccione un caso del historial para expandir los detalles confidenciales.</p>`;
                cargarDenunciasDB();
            }
        }
    </script>
</body>
</html>
